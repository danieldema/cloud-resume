name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-2
  APPLICATION_NAME: resume-app
  ENVIRONMENT_NAME: resume-app-env

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Beanstalk
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Create deployment package
      run: |
        # Create zip file excluding unnecessary files
        zip -r deploy.zip . -x "*.git*" "tmp/*" "var/*" "*.md" "Dockerfile" "task-definition.json"

    - name: Get timestamp for version label
      id: timestamp
      run: echo "timestamp=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

    - name: Deploy to Elastic Beanstalk
      uses: einaregilsson/beanstalk-deploy@v22
      with:
        aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        application_name: ${{ env.APPLICATION_NAME }}
        environment_name: ${{ env.ENVIRONMENT_NAME }}
        region: ${{ env.AWS_REGION }}
        version_label: "v${{ steps.timestamp.outputs.timestamp }}-${{ github.sha }}"
        deployment_package: deploy.zip
        wait_for_deployment: true