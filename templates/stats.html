<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Statistics - Daniel Dema</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .page-wrapper {
            animation: slideInFromRight 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .page-wrapper.slide-right {
            transform: translateX(100%);
        }

        @keyframes slideInFromRight {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(0);
            }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="white" opacity="0.1"/><circle cx="75" cy="75" r="1" fill="white" opacity="0.1"/><circle cx="50" cy="10" r="0.5" fill="white" opacity="0.1"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            opacity: 0.3;
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            cursor: pointer;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .page-title {
            font-size: 2.5em;
            font-weight: 300;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .page-subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-content {
            padding: 50px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .control-label {
            font-weight: 600;
            color: #667eea;
            font-size: 1.1em;
        }

        .control-input {
            padding: 12px 16px;
            border: 2px solid #e8ecff;
            border-radius: 10px;
            font-size: 1em;
            background: #f8f9ff;
            color: #333;
            transition: all 0.3s ease;
            min-width: 120px;
        }

        .control-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .update-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 26px;
        }

        .update-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .chart-container {
            background: #f8f9ff;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid #e8ecff;
            position: relative;
        }

        .chart-title {
            font-size: 1.4em;
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .chart-wrapper {
            position: relative;
            height: 400px;
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 400px;
            color: #666;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e8ecff;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 60px;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #f8f9ff;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #e8ecff;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.1);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
        }

        .stat-label {
            color: #666;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }

            .header {
                padding: 30px 20px;
            }

            .page-title {
                font-size: 2em;
            }

            .main-content {
                padding: 30px 25px;
            }

            .controls {
                flex-direction: column;
                gap: 15px;
            }

            .control-group {
                width: 100%;
            }

            .control-input {
                width: 100%;
            }

            .update-button {
                margin-top: 15px;
                width: 100%;
            }

            .chart-container {
                padding: 20px;
            }

            .chart-wrapper {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper" id="page-wrapper">
        <div class="container">
        <header class="header">
            <button class="back-button" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
                Back to Resume
            </button>
            <div class="header-content">
                <h1 class="page-title">Visitor Statistics</h1>
            </div>
        </header>

        <main class="main-content">
            <div class="controls">
                <div class="control-group">
                    <label class="control-label">Month</label>
                    <select id="month-select" class="control-input">
                        <option value="1">January</option>
                        <option value="2">February</option>
                        <option value="3">March</option>
                        <option value="4">April</option>
                        <option value="5">May</option>
                        <option value="6">June</option>
                        <option value="7">July</option>
                        <option value="8">August</option>
                        <option value="9">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                    </select>
                </div>
                <div class="control-group">
                    <label class="control-label">Year</label>
                    <select id="year-select" class="control-input">
                        <!-- Years will be populated by JavaScript -->
                    </select>
                </div>
                <button class="update-button" onclick="updateChart()">
                    <i class="fas fa-chart-bar"></i>
                    Update Chart
                </button>
            </div>

            <div class="stats-summary" id="stats-summary">
                <!-- Summary stats will be populated by JavaScript -->
            </div>

            <div class="chart-container">
                <h3 class="chart-title" id="chart-title">Daily Visits</h3>
                <div class="chart-wrapper">
                    <div class="loading-state" id="loading-state">
                        <div class="loading-spinner"></div>
                        <span>Loading chart data...</span>
                    </div>
                    <canvas id="visitsChart" style="display: none;"></canvas>
                    <div class="empty-state" id="empty-state" style="display: none;">
                        <i class="fas fa-chart-bar" style="font-size: 3em; margin-bottom: 16px; opacity: 0.3;"></i>
                        <p>No visit data available for the selected month.</p>
                    </div>
                </div>
            </div>
        </main>
        </div>
    </div>

    <script>
        let chart = null;

        function goBack() {
            const pageWrapper = document.getElementById('page-wrapper');
            pageWrapper.classList.add('slide-right');
            
            setTimeout(() => {
                window.location.href = '/?from=stats';
            }, 500);
        }

        function initializeSelectors() {
            const now = new Date();
            const currentMonth = now.getMonth() + 1;
            const currentYear = now.getFullYear();

            // Set current month
            document.getElementById('month-select').value = currentMonth;

            // Populate years (2025 onwards only)
            const yearSelect = document.getElementById('year-select');
            for (let year = currentYear; year >= 2025; year--) {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                if (year === currentYear) option.selected = true;
                yearSelect.appendChild(option);
            }
        }

        function updateChart() {
            const month = document.getElementById('month-select').value;
            const year = document.getElementById('year-select').value;
            const monthName = document.getElementById('month-select').selectedOptions[0].text;
            
            // Show loading state
            document.getElementById('loading-state').style.display = 'flex';
            document.getElementById('visitsChart').style.display = 'none';
            document.getElementById('empty-state').style.display = 'none';

            // Update chart title
            document.getElementById('chart-title').textContent = `Daily Visits - ${monthName} ${year}`;

            fetch(`/daily_stats?month=${month}&year=${year}`)
                .then(response => response.json())
                .then(data => {
                    updateStatsummary(data);
                    renderChart(data);
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    document.getElementById('loading-state').style.display = 'none';
                    document.getElementById('empty-state').style.display = 'flex';
                });
        }

        function updateStatsummary(data) {
            const totalVisits = data.daily_stats.reduce((sum, day) => sum + day.visits, 0);
            const avgDaily = totalVisits > 0 ? (totalVisits / data.daily_stats.length).toFixed(1) : 0;
            const maxDaily = data.daily_stats.length > 0 ? Math.max(...data.daily_stats.map(d => d.visits)) : 0;

            const summaryHtml = `
                <div class="stat-card">
                    <div class="stat-number">${totalVisits}</div>
                    <div class="stat-label">Total Visits</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${avgDaily}</div>
                    <div class="stat-label">Avg per Day</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${maxDaily}</div>
                    <div class="stat-label">Peak Day</div>
                </div>
            `;
            document.getElementById('stats-summary').innerHTML = summaryHtml;
        }

        function renderChart(data) {
            document.getElementById('loading-state').style.display = 'none';

            if (data.daily_stats.length === 0) {
                document.getElementById('empty-state').style.display = 'flex';
                return;
            }

            document.getElementById('visitsChart').style.display = 'block';

            // Destroy existing chart if it exists
            if (chart) {
                chart.destroy();
            }

            const ctx = document.getElementById('visitsChart').getContext('2d');
            
            // Create full month data (fill missing days with 0)
            const daysInMonth = new Date(data.year, data.month, 0).getDate();
            const fullMonthData = [];
            const visitsByDay = {};
            
            data.daily_stats.forEach(day => {
                visitsByDay[day.day] = day.visits;
            });

            for (let day = 1; day <= daysInMonth; day++) {
                fullMonthData.push({
                    day: day,
                    visits: visitsByDay[day] || 0
                });
            }

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: fullMonthData.map(d => d.day),
                    datasets: [{
                        label: 'Daily Visits',
                        data: fullMonthData.map(d => d.visits),
                        backgroundColor: 'rgba(102, 126, 234, 0.8)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 1,
                        borderRadius: 6,
                        borderSkipped: false,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                title: function(context) {
                                    const day = context[0].label;
                                    const monthName = document.getElementById('month-select').selectedOptions[0].text;
                                    const year = document.getElementById('year-select').value;
                                    return `${monthName} ${day}, ${year}`;
                                },
                                label: function(context) {
                                    return `${context.parsed.y} visit${context.parsed.y !== 1 ? 's' : ''}`;
                                }
                            },
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            titleColor: 'white',
                            bodyColor: 'white',
                            borderColor: 'rgba(102, 126, 234, 1)',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1,
                                color: '#666'
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            }
                        },
                        x: {
                            ticks: {
                                color: '#666'
                            },
                            grid: {
                                display: false
                            }
                        }
                    },
                    animation: {
                        duration: 1000,
                        easing: 'easeOutQuart'
                    }
                }
            });
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            initializeSelectors();
            updateChart();
        });
    </script>
</body>
</html>
